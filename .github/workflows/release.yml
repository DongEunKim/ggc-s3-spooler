name: Release

# v*.*.* 태그 push 시 자동 빌드 + AWS 배포
# 수동 실행: Actions 탭 → Release → Run workflow (버전 입력)
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      version:
        description: "배포할 버전 (예: 1.2.0). 비워두면 __init__.py 에서 읽음."
        required: false
        default: ""
      deploy_to_devices:
        description: "디바이스에 즉시 배포 (deploy.yaml 의 target_arn 필요)"
        type: boolean
        required: false
        default: false

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ──────────────────────────────────────────────
  # 1. CI 재실행 (태그 시점 코드 검증)
  # ──────────────────────────────────────────────
  verify:
    name: Verify Tests Pass
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/ -v

  # ──────────────────────────────────────────────
  # 2. 아티팩트 빌드
  # ──────────────────────────────────────────────
  build:
    name: Build Artifact
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      artifact-name: ${{ steps.build.outputs.artifact-name }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      # deploy.yaml 은 gitignore 이므로 CI용 최소 설정을 생성
      - name: Create CI deploy.yaml
        run: |
          cat > deploy.yaml <<EOF
          component:
            name: com.example.S3Spooler
            s3_bucket: ${{ secrets.GGC_ARTIFACT_S3_BUCKET }}
            s3_prefix: artifacts
            region: ${{ secrets.AWS_REGION }}
          deployment:
            name: S3Spooler-auto-deploy
            target_arn: ${{ secrets.GGC_DEPLOYMENT_TARGET_ARN }}
            config_override: {}
          EOF

      - name: Get version
        id: get-version
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION=$(python scripts/bump_version.py --show)
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "[BUILD] 버전: ${VERSION}"

      - name: Build artifact (TGU ARM64 bundle)
        id: build
        # ubuntu-latest (Linux x86_64)에서 빌드하지만, --platform tgu-arm64 지정으로
        # ARM64 Linux용 wheel을 pip download로 가져와 크로스 빌드한다.
        # TGU는 PyPI 차단이므로 번들 빌드가 필수이다.
        run: |
          python scripts/build_artifact.py \
            --platform tgu-arm64 \
            --version "${{ steps.get-version.outputs.version }}"
          ARTIFACT=$(ls dist/artifacts/*/*/*.zip | head -1)
          echo "artifact-name=$(basename ${ARTIFACT})" >> "$GITHUB_OUTPUT"

      - name: Upload build artifacts to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: greengrass-component-${{ steps.get-version.outputs.version }}
          path: dist/
          retention-days: 30

  # ──────────────────────────────────────────────
  # 3. AWS 배포
  # ──────────────────────────────────────────────
  deploy:
    name: Deploy to AWS Greengrass
    runs-on: ubuntu-latest
    needs: build
    environment: production   # GitHub Environment Protection Rules 적용

    permissions:
      id-token: write  # OIDC 인증용
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]" boto3 pyyaml

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: greengrass-component-${{ needs.build.outputs.version }}
          path: dist/

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Create CI deploy.yaml
        run: |
          cat > deploy.yaml <<EOF
          component:
            name: com.example.S3Spooler
            s3_bucket: ${{ secrets.GGC_ARTIFACT_S3_BUCKET }}
            s3_prefix: artifacts
            region: ${{ secrets.AWS_REGION }}
          deployment:
            name: S3Spooler-auto-deploy
            target_arn: ${{ secrets.GGC_DEPLOYMENT_TARGET_ARN }}
            config_override: {}
          EOF

      - name: Deploy to AWS (register only)
        if: ${{ !github.event.inputs.deploy_to_devices }}
        run: |
          python scripts/deploy_aws.py \
            --version "${{ needs.build.outputs.version }}" \
            --only-register

      - name: Deploy to AWS (register + push to devices)
        if: ${{ github.event.inputs.deploy_to_devices == 'true' || startsWith(github.ref, 'refs/tags/') }}
        run: |
          python scripts/deploy_aws.py \
            --version "${{ needs.build.outputs.version }}" \
            --deploy

      # ── GitHub Release 생성 (태그 push 시에만) ──
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          body: |
            ## GGC S3 Spooler ${{ github.ref_name }}

            ### 배포 정보
            - 컴포넌트: `com.example.S3Spooler==${{ needs.build.outputs.version }}`
            - 아티팩트: `${{ needs.build.outputs.artifact-name }}`

            ### 변경 내역
            ${{ github.event.head_commit.message }}
          files: dist/artifacts/**/*.zip
          draft: false
          prerelease: false
