# GGC S3 Spooler Configuration
# CAN Blackbox 패턴을 따른 섹션별 명확한 설정 구조
# CLI 파라미터가 이 설정들을 오버라이드합니다.

[spooler]
# 스풀 디렉토리 — 클라이언트 프로세스가 파일을 저장할 위치
spool_dir = /var/spool/s3-spooler/spool

# 로그 레벨 — DEBUG, INFO, WARNING, ERROR
log_level = INFO

[cleanup]
# 스풀 디렉토리 최대 크기 (MB) — TGU 1GB 파티션 기준 90% 제한
max_spool_size_mb = 900

# 파일 보관 시간 (시간) — 성공 전송 후 로컬 파일 삭제까지 대기
file_retention_hours = 24

# 정리 사이클 주기 (초) — 스풀 디렉토리 감시 및 정리 주기
poll_interval_seconds = 5

[stability]
# 하이브리드 안정성 검증 설정 (CAN Blackbox 패턴)
# 시간 기반 사전 필터링 대기 시간 (초)
file_stability_wait = 0.1

# 크기 기반 안정성 체크 간격 (초)
stability_check_interval = 0.2

# 연속 크기 불변 확인 횟수
stability_check_count = 3

# 최대 안정성 대기 시간 (초) — 타임아웃 후 강제 진행
max_stability_wait = 10.0

[stream_manager]
# Stream Manager 호스트 — 일반적으로 로컬호스트
host = localhost

# Stream Manager 포트 — Greengrass 기본 포트
port = 8088